<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>CH-01 AI | Digital Workshop</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&family=Inter:wght@400;500;600;700&display=swap%22 rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap%22 rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap%22 rel="stylesheet"/>
<script id="tailwind-config">

      tailwind.config = {

        darkMode: "class",

        theme: {

          extend: {

            colors: {

              "outline-variant": "#e4bebc",

              "on-secondary-fixed-variant": "#30476a",

              "inverse-on-surface": "#f8f0e2",

              "on-tertiary-fixed": "#271900",

              "surface-bright": "#fff8f0",

              "secondary-fixed": "#d5e3ff",

              "on-primary-fixed-variant": "#92001c",

              "outline": "#8f6f6e",

              "inverse-primary": "#ffb3b1",

              "surface-tint": "#bb152c",

              "secondary-fixed-dim": "#b0c7f1",

              "primary": "#b7102a",

              "secondary": "#485f84",

              "primary-fixed": "#ffdad8",

              "surface-container-lowest": "#ffffff",

              "on-secondary-fixed": "#001b3c",

              "tertiary-fixed": "#ffdea9",

              "primary-container": "#db313f",

              "on-surface": "#1e1b13",

              "on-surface-variant": "#5b403f",

              "on-secondary": "#ffffff",

              "primary-fixed-dim": "#ffb3b1",

              "surface-dim": "#e1d9cb",

              "surface-variant": "#e9e2d4",

              "inverse-surface": "#343027",

              "on-primary": "#ffffff",

              "error-container": "#ffdad6",

              "surface-container-highest": "#e9e2d4",

              "on-secondary-container": "#445a7f",

              "surface-container": "#f5eddf",

              "tertiary-fixed-dim": "#ffba27",

              "surface-container-low": "#fbf3e4",

              "surface": "#fff8f0",

              "on-tertiary-container": "#fffbff",

              "on-error": "#ffffff",

              "on-primary-fixed": "#410007",

              "on-tertiary-fixed-variant": "#5e4100",

              "background": "#fff8f0",

              "secondary-container": "#bbd3fd",

              "tertiary-container": "#996c00",

              "tertiary": "#7a5500",

              "on-error-container": "#93000a",

              "on-primary-container": "#fffbff",

              "surface-container-high": "#efe7d9",

              "on-background": "#1e1b13",

              "on-tertiary": "#ffffff",

              "error": "#ba1a1a"

            },

            fontFamily: {

              "headline": ["Manrope"],

              "body": ["Inter"],

              "label": ["Inter"]

            },

            borderRadius: {"DEFAULT": "0px", "lg": "0px", "xl": "0px", "full": "9999px"},

          },

        },

      }
</script>
<style>

        .material-symbols-outlined {

            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

        }

        body {

            background-color: #fff8f0;

            color: #1e1b13;

        }

        .bauhaus-grid {

            background-size: 40px 40px;

            background-image: radial-gradient(circle, #e9e2d4 1px, transparent 1px);

        }

        .rectangular-bubble {

            border: 2px solid #1e1b13;

            box-shadow: 4px 4px 0px 0px #1e1b13;

        }

        .bauhaus-accent-circle {

            width: 300px;

            height: 300px;

            background-color: #485f84;

            opacity: 0.1;

            border-radius: 9999px;

            position: fixed;

            top: -50px;

            right: -50px;

            z-index: -1;

        }

        .bauhaus-accent-square {

            width: 200px;

            height: 200px;

            background-color: #b7102a;

            opacity: 0.05;

            position: fixed;

            bottom: 10%;

            left: 20%;

            z-index: -1;

            transform: rotate(15deg);

        }
    </style>
</head>
<body class="font-body selection:bg-primary selection:text-white">
<div class="bauhaus-accent-circle"></div>
<div class="bauhaus-accent-square"></div>
 
    <div class="fixed inset-0 bg-black/50 backdrop-blur-sm z-30 hidden md:hidden" id="sidebar-overlay"></div>
 
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="logo">
            <span class="logo-icon">🤖</span>
            <span class="logo-text">AI Assistant</span>
        </div>

        <div class="upload-container">
            <h3 class="section-title">Upload Knowledge</h3>
            <div class="file-input-wrapper" id="drop-zone">
                <input type="file" id="pdf-upload" accept=".pdf">
                <div class="upload-icon">📄</div>
                <div class="upload-text" id="file-name-display">Drag & Drop PDF or Click</div>
            </div>
            <button class="upload-btn" id="process-btn" disabled>Process Knowledge</button>
        </div>

        <h3 class="section-title">Documents</h3>
        <div class="doc-list" id="doc-list">
            <div style="color: var(--text-muted); font-size: 12px; padding: 10px;">Refreshing documents...</div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Mobile Header -->
        <div class="header-mobile">
            <button class="menu-toggle" id="menu-toggle">☰</button>
            <div class="logo" style="margin-bottom: 0;">
                <span class="logo-text" style="font-size: 16px;">AI Assistant</span>
            </div>
            <div style="width: 32px;"></div> <!-- Spacer -->
        </div>

        <!-- Desktop Header -->
        <div class="chat-header">
            <div>
                <h2 style="font-size: 20px; font-weight: 700; letter-spacing: -0.5px;">Knowledge Base Chat</h2>
                <div style="display: flex; align-items: center; margin-top: 4px;">
                    <span class="status-dot"></span>
                    <p style="font-size: 12px; font-weight: 600; color: var(--text-muted);" id="api-status">
                        Connecting...</p>
                </div>
            </div>
            <div style="text-align: right; color: var(--text-muted); font-size: 11px; font-weight: 500;">f
            </div>
        </div>

        <div class="chat-messages" id="chat-messages">
            <div class="message bot-message">
                <div class="message-avatar">🤖</div>
                <div class="message-content">
                    Greetings! I specialize in extracting knowledge from your Dell documentation. Upload your PDFs and
                    I'll help you find answers instantly.
                </div>
            </div>
        </div>

        <div class="chat-input-container">
            <div class="input-wrapper">
                <input type="text" class="chat-input" id="chat-input" placeholder="Query the knowledge base..."
                    autocomplete="off">
                <button class="send-btn" id="send-btn" title="Send Question">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>

        const chatMessages = document.getElementById('chat-messages');

        const chatInput = document.getElementById('chat-input');

        const sendBtn = document.getElementById('send-btn');

        const pdfUpload = document.getElementById('pdf-upload');

        const processBtn = document.getElementById('process-btn');

        const fileNameDisplay = document.getElementById('file-name-display');

        const docList = document.getElementById('doc-list');

        const apiStatus = document.getElementById('api-status');

        const toast = document.getElementById('toast');

        const dropZone = document.getElementById('drop-zone');

        const menuToggle = document.getElementById('menu-toggle');

        const sidebar = document.getElementById('sidebar');

        const overlay = document.getElementById('sidebar-overlay');
 
        // Mobile Sidebar Logic

        menuToggle.addEventListener('click', () => {

            sidebar.classList.toggle('active');

            overlay.classList.toggle('active');

        });
 
        overlay.addEventListener('click', () => {

            sidebar.classList.remove('active');

            overlay.classList.remove('active');

        });
 
        // Drag and Drop Effects

        ['dragenter', 'dragover'].forEach(eventName => {

            dropZone.addEventListener(eventName, (e) => {

                e.preventDefault();

                dropZone.classList.add('border-primary', 'bg-primary/10'); // Tailwind classes for drag-active

            });

        });
 
        ['dragleave', 'drop'].forEach(eventName => {

            dropZone.addEventListener(eventName, (e) => {

                e.preventDefault();

                dropZone.classList.remove('border-primary', 'bg-primary/10'); // Tailwind classes for drag-active

            });

        });
 
        dropZone.addEventListener('drop', (e) => {

            const dt = e.dataTransfer;

            const files = dt.files;

            if (files.length > 0) {

                pdfUpload.files = files;

                updateFileDisplay(files[0].name);

            }

        });
 
        function updateFileDisplay(name) {

            fileNameDisplay.textContent = name;

            fileNameDisplay.classList.add('text-primary'); // Use Tailwind class for color

            processBtn.disabled = false;

        }
 
        pdfUpload.addEventListener('change', (e) => {

            if (e.target.files[0]) updateFileDisplay(e.target.files[0].name);

        });
 
        // Health & Docs

        async function checkHealth() {

            try {

                const response = await fetch('/health');

                const data = await response.json();

                if (response.ok && data.status === 'healthy') {

                    apiStatus.textContent = `Connected | ${data.pdf_count} Knowledge Bundles`;

                    apiStatus.classList.remove('text-error'); // Remove error color if previously set

                    apiStatus.classList.add('text-primary'); // Add a success-like color if desired

                } else {

                    apiStatus.textContent = `Backend Offline: ${data.detail || 'Unknown error'}`;

                    apiStatus.classList.add('text-error');

                    apiStatus.classList.remove('text-primary');

                }

                updateDocDisplay(data.pdf_count);

            } catch (err) {

                apiStatus.textContent = 'Backend Offline';

                apiStatus.classList.add('text-error');

                apiStatus.classList.remove('text-primary');

            }

        }
 
        function updateDocDisplay(count) {

            docList.innerHTML = '<h3 class="text-xs font-bold uppercase tracking-widest text-secondary mb-4">Documents</h3>'; // Re-add title

            if (count === 0) {

                docList.innerHTML += '<div class="text-xs text-outline-variant py-2">Library is empty.</div>';

            } else {

                const item = document.createElement('div');

                item.className = 'flex items-center gap-4 p-3 bg-surface-container-low border-2 border-outline text-sm text-on-surface mb-2'; // New Bauhaus doc item style

                item.innerHTML = `<span class="material-symbols-outlined text-primary">description</span> <span class="font-body font-medium">${count} Active Knowledge Source(s)</span>`;

                docList.appendChild(item);

            }

        }
 
        // Processing

        processBtn.addEventListener('click', async () => {

            const file = pdfUpload.files[0];

            if (!file) return;
 
            processBtn.disabled = true;

            processBtn.innerHTML = `<span class="material-symbols-outlined animate-spin">progress_activity</span> <span class="ml-2">Indexing...</span>`; // Using Material Symbols for spinner

            showToast('Building knowledge index...', 'primary'); // Use Tailwind color name
 
            const formData = new FormData();

            formData.append('file', file);
 
            try {

                const response = await fetch('/upload-pdf', {

                    method: 'POST',

                    body: formData

                });
 
                if (response.ok) {

                    showToast('Knowledge Bundle Integrated!', 'accent'); // Use Tailwind color name

                    checkHealth();

                } else {

                    const data = await response.json();

                    showToast(`Integration Failed: ${data.detail}`, 'error'); // Use Tailwind color name

                }

            } catch (err) {

                showToast('Network error during processing', 'error'); // Use Tailwind color name

            } finally {

                processBtn.innerHTML = 'Process Knowledge';

                processBtn.disabled = false;

            }

        });
 
        // Chat Logic

        function addMessage(text, role, sources = []) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}-message`;

            msgDiv.innerHTML = `
                <div class="message-avatar">${role === 'user' ? '👤' : '🤖'}</div>
                <div class="message-content">
                    ${text}
                    ${sources && sources.length > 0 ? `
                        <div class="sources-container">
                            <div style="font-size: 11px; font-weight: 800; color: var(--text-muted); letter-spacing: 0.5px;">SOURCES:</div>
                            ${sources.map(src => `
                                <div class="source-card">
                                    <div class="source-header"><span>•</span> ${src.source} (Page ${src.page})</div>
                                    <div style="opacity: 0.85; line-height: 1.5">${src.content}</div>
                                </div>
                            `).join('')}
                        </div>
                    ` : ''}
                </div>
            `;

            chatMessages.appendChild(msgContainer);

            chatMessages.scrollTo({ top: chatMessages.scrollHeight, behavior: 'smooth' });

        }
 
        async function handleSend() {

            const question = chatInput.value.trim();

            if (!question) return;
 
            addMessage(question, 'user');

            chatInput.value = '';

            sendBtn.disabled = true;

            const typingDiv = document.createElement('div');
            typingDiv.className = 'message bot-message';
            typingDiv.id = 'typing-indicator-msg';
            typingDiv.innerHTML = `
                <div class="message-avatar">🤖</div>
                <div class="message-content">
                    <div class="typing-indicator"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                </div>
            `;

            chatMessages.appendChild(typingContainer);

            chatMessages.scrollTo({ top: chatMessages.scrollHeight, behavior: 'smooth' });
 
            try {

                const response = await fetch('/ask', {

                    method: 'POST',

                    headers: { 'Content-Type': 'application/json' },

                    body: JSON.stringify({ question })

                });
 
                const data = await response.json();
                document.getElementById('typing-indicator-msg').remove();

                if (response.ok) {

                    addMessage(data.answer, 'bot', data.sources);

                } else {

                    addMessage(`I encountered an obstacle: ${data.detail || 'Analysis failed'}`, 'bot');

                }

            } catch (err) {

                if (document.getElementById('typing-indicator-msg')) {

                    document.getElementById('typing-indicator-msg').remove();

                }

                addMessage('Network disruption. Please verify the backend connection.', 'bot');

            } finally {

                sendBtn.disabled = false;

            }

        }
 
        sendBtn.addEventListener('click', handleSend);

        chatInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSend(); });
 
        function showToast(text, colorClass) {

            // Map color names to Tailwind classes if needed, or use direct classes

            let borderColor = '';

            let textColor = '';

            if (colorClass === 'primary') {

                borderColor = 'border-primary';

                textColor = 'text-primary';

            } else if (colorClass === 'accent') {

                borderColor = 'border-accent'; // Assuming 'accent' is defined in Tailwind config

                textColor = 'text-accent';

            } else if (colorClass === 'error') {

                borderColor = 'border-error';

                textColor = 'text-error';

            } else {

                borderColor = 'border-outline';

                textColor = 'text-on-surface';

            }
 
            toast.textContent = text;

            toast.className = `fixed bottom-8 left-1/2 -translate-x-1/2 px-6 py-3 bg-surface-container-high border-2 ${borderColor} ${textColor} text-sm font-bold uppercase tracking-widest rounded-none shadow-lg opacity-100 transition-all duration-300 z-50`;

            setTimeout(() => {

                toast.classList.remove('opacity-100');

                toast.classList.add('opacity-0');

            }, 3500);

        }
 
        // Init

        checkHealth();

        setInterval(checkHealth, 15000);
</script>
</body>
</html>
